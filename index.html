<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Etch-a-Sketch</title>
        <script defer src="script.js"></script>
        <link rel="stylesheet" href="style.css" />
        <link
            rel="icon"
            href="Assets/favicon-16.png"
            sizes="16x16"
            type="image/png"
        />
        <link
            rel="icon"
            href="Assets/favicon-32.png"
            sizes="32x32"
            type="image/png"
        />
    </head>
    <body>
        <div class="header">
            <h1>Etch-a-Sketch</h1>
        </div>
        <div class="content">
            <div class="input-section">
                <form id="grid-size-form">
                    <label for="grid-size">Enter number of grid:</label>
                    <input id="grid-size-input" pattern="\d*" type="text" />
                    <button id="grid-size-input-button">Set</button>
                </form>
            </div>
            <div id="grid-container"></div>
        </div>
        <div class="footer">
            <a
                href="https://www.flaticon.com/free-icons/etch-a-sketch"
                title="Etch a sketch icons"
                >Etch a sketch icons created by Creaticca Creative Agency -
                Flaticon</a
            >
        </div>
    </body>
</html>
