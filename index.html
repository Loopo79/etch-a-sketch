<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Etch-a-Sketch</title>
        <script defer src="script.js"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="header">
            <h1>Etch-a-Sketch</h1>
        </div>
        <div class="content">
            <div class="input-section">
                <form id="grid-size-form">
                    <label for="grid-size">Enter number of grid:</label>
                    <input id="grid-size-input" pattern="\d*" type="text" />
                    <span></span>
                </form>
            </div>
            <div class="grid-container"></div>
        </div>
        <div class="footer">Footer</div>
    </body>
</html>
